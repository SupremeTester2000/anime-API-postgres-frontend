<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeDB - Tu Base de Datos de Anime</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #ff006e;
            --secondary-color: #8338ec;
            --accent-color: #3a86ff;
            --dark-bg: #0a0e27;
            --card-bg: #1a1f3a;
            --border-color: #2d3561;
            --text-primary: #ffffff;
            --text-secondary: #b0b8cc;
            --success: #06d6a0;
            --danger: #ff006e;
            --warning: #ffbe0b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--dark-bg) 0%, #1a1530 100%);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255, 0, 110, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(51, 134, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        header {
            background: linear-gradient(135deg, rgba(255, 0, 110, 0.1) 0%, rgba(131, 56, 236, 0.1) 100%);
            border-bottom: 2px solid var(--border-color);
            padding: 2rem 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .search-bar {
            flex: 1;
            min-width: 250px;
            max-width: 400px;
        }

        .search-bar input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .search-bar input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 20px rgba(255, 0, 110, 0.3);
        }

        .search-bar input::placeholder {
            color: var(--text-secondary);
        }

        .header-buttons {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 0, 110, 0.3);
        }

        .btn-secondary {
            background: var(--card-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            opacity: 0.8;
            transform: translateY(-2px);
        }

        .btn-success {
            background: var(--success);
            color: var(--dark-bg);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(6, 214, 160, 0.3);
        }

        .btn-small {
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
        }

        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .animes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .anime-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .anime-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary-color);
            box-shadow: 0 20px 40px rgba(255, 0, 110, 0.2);
        }

        .anime-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
            background: linear-gradient(135deg, var(--secondary-color), var(--accent-color));
            position: relative;
        }

        .anime-image.placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        .anime-content {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .anime-title {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .anime-meta {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .anime-meta span {
            display: flex;
            gap: 0.5rem;
        }

        .anime-meta strong {
            color: var(--primary-color);
        }

        .anime-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }

        .anime-actions button {
            flex: 1;
            padding: 0.6rem;
            font-size: 0.85rem;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 39, 0.8);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .modal-header h2 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .close-btn:hover {
            color: var(--primary-color);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            background: rgba(255, 0, 110, 0.05);
            box-shadow: 0 0 20px rgba(255, 0, 110, 0.2);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: var(--text-secondary);
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: -9999px;
        }

        .file-input-label {
            display: block;
            padding: 1rem;
            background: rgba(255, 0, 110, 0.1);
            border: 2px dashed var(--primary-color);
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--primary-color);
        }

        .file-input-label:hover {
            background: rgba(255, 0, 110, 0.15);
        }

        .file-input-wrapper input[type="file"]:focus + .file-input-label {
            outline: 2px solid var(--primary-color);
            outline-offset: 2px;
        }

        .file-name {
            margin-top: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .modal-footer {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }

        .modal-footer button {
            flex: 1;
        }

        /* Loading & Empty States */
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid var(--border-color);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* Alert Messages */
        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert.active {
            display: block;
        }

        .alert-success {
            background: rgba(6, 214, 160, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .alert-error {
            background: rgba(255, 0, 110, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        .alert-info {
            background: rgba(58, 134, 255, 0.1);
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
            }

            .search-bar {
                max-width: 100%;
            }

            .header-buttons {
                width: 100%;
            }

            .header-buttons button {
                flex: 1;
            }

            .animes-grid {
                grid-template-columns: 1fr;
            }

            .modal-content {
                padding: 1.5rem;
            }

            .anime-actions {
                flex-direction: column;
            }
        }

        .view-btn:hover {
            background: var(--accent-color);
        }

        .edit-btn:hover {
            background: var(--warning);
            color: var(--dark-bg);
        }

        .delete-btn {
            background: var(--danger);
        }

        .delete-btn:hover {
            opacity: 0.8;
        }

        .no-image {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(131, 56, 236, 0.3), rgba(58, 134, 255, 0.3));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-content">
            <div class="logo">🎌 AnimeDB</div>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Buscar anime...">
            </div>
            <div class="header-buttons">
                <button class="btn btn-secondary" id="resetBtn">↻ Limpiar</button>
                <button class="btn btn-primary" id="addAnimeBtn">+ Nuevo Anime</button>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <div class="container">
        <!-- Alert Messages -->
        <div id="alertBox"></div>

        <!-- Animes Grid -->
        <div id="loadingContainer" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Cargando animes...</p>
        </div>

        <div id="animeContainer" class="animes-grid"></div>

        <div id="emptyState" class="empty-state" style="display: none;">
            <div class="empty-state-icon"></div>
            <p>No hay animes para mostrar</p>
        </div>
    </div>

    <!-- Add/Edit Anime Modal -->
    <div id="animeModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Agregar Nuevo Anime</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>

            <form id="animeForm">
                <div class="form-group">
                    <label for="title">Título del Anime *</label>
                    <input type="text" id="title" placeholder="Ej: Naruto Shippuden" required>
                </div>

                <div class="form-group">
                    <label for="episodios">Número de Episodios</label>
                    <input type="number" id="episodios" placeholder="500" min="0">
                </div>

                <div class="form-group">
                    <label for="fecha_ini">Fecha de Inicio</label>
                    <input type="date" id="fecha_ini">
                </div>

                <div class="form-group">
                    <label for="fecha_fin">Fecha de Fin</label>
                    <input type="date" id="fecha_fin">
                </div>

                <div class="form-group">
                    <label for="image_url">URL de Imagen (opcional)</label>
                    <input type="url" id="image_url" placeholder="https://ejemplo.com/imagen.jpg">
                </div>

                <div class="form-group">
                    <label>O sube una imagen</label>
                    <div class="file-input-wrapper">
                        <input type="file" id="imageFile" accept="image/*">
                        <label for="imageFile" class="file-input-label">
                            Selecciona una imagen
                        </label>
                        <div class="file-name" id="fileName"></div>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn btn-success">Guardar Anime</button>
                </div>
            </form>
        </div>
    </div>

    <!-- View Details Modal -->
    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="detailsTitle">Detalles del Anime</h2>
                <button class="close-btn" onclick="closeDetailsModal()">&times;</button>
            </div>

            <div id="detailsContent" style="line-height: 1.8;">
                <!-- Content will be inserted here -->
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeDetailsModal()">Cerrar</button>
                <button type="button" class="btn btn-primary" id="editFromDetailsBtn" onclick="editFromDetails()">Editar</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://anime-api-v1-1-0.onrender.com/api';
        let allAnimes = [];
        let currentEditingId = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadAnimes();
            setupEventListeners();
        });

        function setupEventListeners() {
            document.getElementById('addAnimeBtn').addEventListener('click', openAddModal);
            document.getElementById('animeForm').addEventListener('submit', handleFormSubmit);
            document.getElementById('searchInput').addEventListener('input', filterAnimes);
            document.getElementById('resetBtn').addEventListener('click', resetSearch);
            document.getElementById('imageFile').addEventListener('change', handleFileSelect);
        }

        async function loadAnimes() {
            showLoading(true);
            try {
                const response = await fetch(`${API_BASE_URL}/animes`);
                const data = await response.json();
                allAnimes = data.animes || [];
                renderAnimes(allAnimes);
                showLoading(false);
            } catch (error) {
                console.error('Error loading animes:', error);
                showAlert('Error al cargar los animes', 'error');
                showLoading(false);
            }
        }

        function renderAnimes(animes) {
            const container = document.getElementById('animeContainer');
            const emptyState = document.getElementById('emptyState');

            if (animes.length === 0) {
                container.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            container.innerHTML = animes.map(anime => `
                <div class="anime-card">
                    <div class="anime-image">
                        ${anime.image_url 
                            ? `<img src="${anime.image_url}" alt="${anime.title}" style="width: 100%; height: 100%; object-fit: cover;">` 
                            : `<div class="no-image"></div>`
                        }
                    </div>
                    <div class="anime-content">
                        <h3 class="anime-title">${anime.title}</h3>
                        <div class="anime-meta">
                            ${anime.episodios ? `<span><strong>Episodios:</strong> ${anime.episodios}</span>` : ''}
                            ${anime.fecha_ini ? `<span><strong>Inicio:</strong> ${new Date(anime.fecha_ini).toLocaleDateString('es-ES')}</span>` : ''}
                            ${anime.fecha_fin ? `<span><strong>Fin:</strong> ${new Date(anime.fecha_fin).toLocaleDateString('es-ES')}</span>` : ''}
                        </div>
                    </div>
                    <div class="anime-actions">
                        <button class="btn btn-secondary btn-small view-btn" onclick="viewAnimeDetails(${anime.id})">Ver</button>
                        <button class="btn btn-secondary btn-small edit-btn" onclick="openEditModal(${anime.id})">Editar</button>
                        <button class="btn btn-danger btn-small delete-btn" onclick="deleteAnime(${anime.id})">Eliminar</button>
                    </div>
                </div>
            `).join('');
        }

        function filterAnimes() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allAnimes.filter(anime =>
                anime.title.toLowerCase().includes(searchTerm)
            );
            renderAnimes(filtered);
        }

        function resetSearch() {
            document.getElementById('searchInput').value = '';
            renderAnimes(allAnimes);
        }

        function openAddModal() {
            currentEditingId = null;
            document.getElementById('animeForm').reset();
            document.getElementById('modalTitle').textContent = 'Agregar Nuevo Anime';
            document.getElementById('animeModal').classList.add('active');
        }

        async function openEditModal(id) {
            const anime = allAnimes.find(a => a.id === id);
            if (!anime) return;

            currentEditingId = id;
            document.getElementById('modalTitle').textContent = 'Editar Anime';

            document.getElementById('title').value = anime.title || '';
            document.getElementById('episodios').value = anime.episodios || '';
            document.getElementById('fecha_ini').value = anime.fecha_ini ? anime.fecha_ini.split('T')[0] : '';
            document.getElementById('fecha_fin').value = anime.fecha_fin ? anime.fecha_fin.split('T')[0] : '';
            document.getElementById('image_url').value = anime.image_url || '';

            document.getElementById('animeModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('animeModal').classList.remove('active');
            currentEditingId = null;
            document.getElementById('animeForm').reset();
        }

        async function handleFormSubmit(e) {
            e.preventDefault();

            const title = document.getElementById('title').value;
            const episodios = document.getElementById('episodios').value;
            const fecha_ini = document.getElementById('fecha_ini').value;
            const fecha_fin = document.getElementById('fecha_fin').value;
            const image_url = document.getElementById('image_url').value;
            const imageFile = document.getElementById('imageFile').files[0];

            if (!title) {
                showAlert('El título es requerido', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('title', title);
            if (episodios) formData.append('episodios', episodios);
            if (fecha_ini) formData.append('fecha_ini', fecha_ini);
            if (fecha_fin) formData.append('fecha_fin', fecha_fin);
            if (image_url) formData.append('image_url', image_url);
            if (imageFile) formData.append('image', imageFile);

            try {
                const url = currentEditingId
                    ? `${API_BASE_URL}/animes/${currentEditingId}`
                    : `${API_BASE_URL}/animes`;

                const method = currentEditingId ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method,
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert(
                        currentEditingId ? 'Anime actualizado correctamente' : 'Anime creado correctamente',
                        'success'
                    );
                    closeModal();
                    loadAnimes();
                } else {
                    showAlert(data.error || 'Error al guardar el anime', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('Error al guardar el anime', 'error');
            }
        }

        async function viewAnimeDetails(id) {
            const anime = allAnimes.find(a => a.id === id);
            if (!anime) return;

            const detailsContent = document.getElementById('detailsContent');
            detailsContent.innerHTML = `
                <div style="text-align: center;">
                    ${anime.image_url 
                        ? `<img src="${anime.image_url}" alt="${anime.title}" style="max-width: 100%; border-radius: 8px; margin-bottom: 1.5rem; max-height: 400px;">` 
                        : `<div style="width: 100%; height: 300px; background: linear-gradient(135deg, rgba(131, 56, 236, 0.3), rgba(58, 134, 255, 0.3)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 4rem; margin-bottom: 1.5rem;"></div>`
                    }
                </div>
                <p><strong>Título:</strong> ${anime.title}</p>
                ${anime.episodios ? `<p><strong>Episodios:</strong> ${anime.episodios}</p>` : ''}
                ${anime.fecha_ini ? `<p><strong>Fecha de Inicio:</strong> ${new Date(anime.fecha_ini).toLocaleDateString('es-ES')}</p>` : ''}
                ${anime.fecha_fin ? `<p><strong>Fecha de Fin:</strong> ${new Date(anime.fecha_fin).toLocaleDateString('es-ES')}</p>` : ''}
                <p style="color: var(--text-secondary); font-size: 0.9rem;"><strong>ID:</strong> ${anime.id}</p>
                <p style="color: var(--text-secondary); font-size: 0.9rem;"><strong>Creado:</strong> ${new Date(anime.createdAt).toLocaleString('es-ES')}</p>
            `;

            document.getElementById('detailsTitle').textContent = anime.title;
            document.getElementById('editFromDetailsBtn').onclick = () => {
                closeDetailsModal();
                openEditModal(id);
            };
            document.getElementById('detailsModal').classList.add('active');
        }

        function closeDetailsModal() {
            document.getElementById('detailsModal').classList.remove('active');
        }

        function editFromDetails() {
            const animeId = parseInt(document.getElementById('detailsTitle').textContent);
        }

        async function deleteAnime(id) {
            if (!confirm('¿Estás seguro de que deseas eliminar este anime?')) return;

            try {
                const response = await fetch(`${API_BASE_URL}/animes/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    showAlert('Anime eliminado correctamente', 'success');
                    loadAnimes();
                } else {
                    showAlert('Error al eliminar el anime', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('Error al eliminar el anime', 'error');
            }
        }

        function handleFileSelect(e) {
            const file = e.target.files[0];
            const fileNameDiv = document.getElementById('fileName');

            if (file) {
                fileNameDiv.textContent = `✓ ${file.name}`;
                document.getElementById('image_url').value = '';
            } else {
                fileNameDiv.textContent = '';
            }
        }

        function showLoading(show) {
            document.getElementById('loadingContainer').style.display = show ? 'block' : 'none';
        }

        function showAlert(message, type) {
            const alertBox = document.getElementById('alertBox');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type} active`;
            alertDiv.textContent = message;

            alertBox.innerHTML = '';
            alertBox.appendChild(alertDiv);

            setTimeout(() => {
                alertDiv.classList.remove('active');
            }, 4000);
        }
    </script>
</body>
</html>
